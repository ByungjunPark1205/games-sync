services:
  - type: web
    name: games-sync
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: ADMIN_KEY
        sync: false
      - key: DATA_ENCRYPTION_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: UPSTASH_STORE_KEY
        value: games-sync:store
      - key: DATABASE_PATH
        value: /var/data/games-sync.localdb
      - key: ALLOW_DATABASE_BOOTSTRAP
        value: false
    disk:
      name: games-sync-data
      mountPath: /var/data
      sizeGB: 1
