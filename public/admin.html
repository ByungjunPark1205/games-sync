<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#121212" />
    <title>Games Sync Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell admin-shell">
      <section class="hero navy-card admin-hero" aria-labelledby="admin-title">
        <div class="brand-row">
          <a class="icon-button admin-button" href="/" aria-label="홈으로 이동" title="홈으로 이동">HOME</a>
        </div>
        <div class="hero-copy">
          <p class="eyebrow">Games Signal project</p>
          <h1 id="admin-title">ADMIN</h1>
          <p class="tagline">입장 코드와 SIGNAL 운영을 관리해요.</p>
        </div>
      </section>

      <section class="panel" id="adminLoginPanel">
        <h2>관리자 로그인</h2>
        <form id="adminLoginForm" class="form-stack">
          <label>
            <span>관리자 코드</span>
            <input id="adminKey" type="password" autocomplete="current-password" placeholder="관리자 코드" required />
          </label>
          <p class="form-error hidden" id="adminLoginError"></p>
          <button class="primary-button" type="submit">관리자 페이지 열기</button>
        </form>
      </section>

      <section class="panel hidden" id="adminDashboard">
        <div class="section-head">
          <div>
            <p class="eyebrow">Control Room</p>
            <h2>룸 설정</h2>
          </div>
          <button class="ghost-button refresh-button" id="adminRefresh" type="button">새로고침</button>
        </div>

        <label>
          <span>관리할 룸</span>
          <select id="roomSelect"></select>
        </label>
        <div class="admin-room-actions">
          <button class="danger-button" id="deleteRoomButton" type="button">현재 룸 삭제</button>
        </div>
        <p class="admin-storage" id="adminStorageStatus"></p>

        <form id="adminSettingsForm" class="form-stack">
          <label>
            <span>입장 코드</span>
            <input id="adminEventCode" minlength="4" required />
          </label>
          <div class="admin-limits">
            <label>
              <span>기본 SIGNAL</span>
              <input id="adminSignalLimit" type="number" min="0" step="1" required />
            </label>
            <label>
              <span>기본 OPEN SIGNAL</span>
              <input id="adminOpenSignalLimit" type="number" min="0" step="1" required />
            </label>
            <label>
              <span>기본 회수권</span>
              <input id="adminRevokeLimit" type="number" min="0" step="1" required />
            </label>
          </div>
          <label>
            <span>새 관리자 코드</span>
            <input id="newAdminKey" type="password" autocomplete="new-password" placeholder="변경할 때만 입력" minlength="4" />
          </label>
          <button class="primary-button" type="submit">설정 저장</button>
        </form>
      </section>

      <section class="panel hidden" id="createRoomPanel">
        <h2>새 룸 만들기</h2>
        <form id="createRoomForm" class="form-stack">
          <label>
            <span>새 입장 코드</span>
            <input id="newRoomCode" minlength="4" placeholder="예: ROOM2026" required />
          </label>
          <div class="admin-limits">
            <label>
              <span>기본 SIGNAL</span>
              <input id="newRoomSignalLimit" type="number" min="0" step="1" value="10" required />
            </label>
            <label>
              <span>기본 OPEN</span>
              <input id="newRoomOpenSignalLimit" type="number" min="0" step="1" value="1" required />
            </label>
            <label>
              <span>기본 회수권</span>
              <input id="newRoomRevokeLimit" type="number" min="0" step="1" value="3" required />
            </label>
          </div>
          <button class="primary-button" type="submit">룸 추가</button>
        </form>
      </section>

      <section class="panel hidden" id="circleAdminPanel">
        <div class="section-head">
          <div>
            <p class="eyebrow">SYNC Circle</p>
            <h2>Circle 만들기</h2>
          </div>
          <p class="admin-count" id="circleStatus">미공개</p>
        </div>
        <form id="circleForm" class="form-stack">
          <label>
            <span>Circle 인원수</span>
            <input id="circleSize" type="number" min="1" step="1" value="4" required />
          </label>
          <div class="circle-admin-box">
            <div class="section-head compact-head">
              <div>
                <p class="eyebrow">Fixed Members</p>
                <h3>무조건 같은 Circle</h3>
              </div>
              <button class="ghost-button" id="addFixedGroupButton" type="button">묶음 추가</button>
            </div>
            <p class="admin-user-meta">같은 Circle에 넣을 사람들을 2명 이상 선택한 뒤 묶음을 추가하세요.</p>
            <div class="fixed-member-list" id="fixedMemberList"></div>
            <div class="fixed-group-list" id="fixedGroupList"></div>
          </div>
          <button class="primary-button" type="submit">Circle 미리보기 만들기</button>
        </form>
        <div class="circle-preview-block">
          <div class="section-head compact-head">
            <div>
              <p class="eyebrow">Draft</p>
              <h3>미리보기</h3>
            </div>
            <button class="primary-button" id="confirmCircleButton" type="button">확정하기</button>
          </div>
          <div class="admin-circle-preview" id="circleDraftPreview"></div>
        </div>
        <div class="circle-preview-block">
          <p class="eyebrow">Published</p>
          <h3>현재 공개된 Circle</h3>
          <div class="admin-circle-preview" id="circleActivePreview"></div>
        </div>
      </section>

      <section class="panel hidden" id="participantsPanel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Participants</p>
            <h2>현재 룸 참가자</h2>
          </div>
          <p class="admin-count" id="adminCount">0명</p>
        </div>
        <div class="admin-user-list" id="adminUserList"></div>
      </section>

      <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>
    </main>
    <script src="/admin.js"></script>
  </body>
</html>
